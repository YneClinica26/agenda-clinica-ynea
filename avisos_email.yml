name: Ynea avisos email 48h

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enviar avisos 48h
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: node ynea_send_avisos_resend.js
